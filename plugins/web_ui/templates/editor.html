<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✏️ {{ filename }} — Zentra Editor</title>
<link rel="icon" type="image/png" href="/assets/Zentra_Core_Logo_NBG.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0d1117;
    --surface:    #161b22;
    --border:     #30363d;
    --text:       #e6edf3;
    --muted:      #8b949e;
    --accent:     #58a6ff;
    --accent-dim: #1f6feb;
    --success:    #3fb950;
    --warn:       #d29922;
    --danger:     #f85149;
    --tab-h:      44px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

  /* ── Top bar ──────────────────────────────────────────────────────── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 0;
    height: var(--tab-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    user-select: none;
    flex-shrink: 0;
  }
  #topbar .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-right: 16px;
    text-decoration: none;
  }
  #topbar .logo img { height: 22px; opacity: 0.8; }
  #topbar .logo:hover { color: var(--text); }

  .tab-bar {
    display: flex;
    align-items: stretch;
    flex: 1;
    overflow: hidden;
    height: 100%;
  }
  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 14px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    background: var(--bg);
    border-right: 1px solid var(--border);
    border-bottom: 2px solid var(--accent);
    white-space: nowrap;
    overflow: hidden;
    max-width: 240px;
    text-overflow: ellipsis;
  }
  .tab .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .tab.modified .dot { background: var(--warn); }
  .tab .lang-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--accent-dim);
    color: #fff;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    text-transform: uppercase;
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 5px;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-save { background: var(--accent-dim); color: #fff; }
  .btn-save:hover { background: var(--accent); }
  .btn-save:disabled { background: var(--border); color: var(--muted); cursor: default; }
  .btn-drive { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-drive:hover { color: var(--text); border-color: var(--muted); }

  /* ── Status bar ──────────────────────────────────────────────────── */
  #statusbar {
    display: flex;
    align-items: center;
    gap: 12px;
    height: 24px;
    background: var(--accent-dim);
    padding: 0 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    flex-shrink: 0;
  }
  #statusbar .sep { color: rgba(255,255,255,0.3); }
  #status-msg {
    margin-left: auto;
    font-weight: 500;
    transition: color 0.3s;
  }
  #status-msg.ok   { color: #7ee787; }
  #status-msg.err  { color: #ff7b72; }
  #status-msg.saving { color: #e3b341; }
  #status-cursor, #status-lang, #status-enc { /* individual cells */ }

  /* ── Layout ──────────────────────────────────────────────────────── */
  #layout {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  #editor-container {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  #monaco-editor {
    position: absolute;
    inset: 0;
  }

  /* ── Toast ───────────────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 40px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--success);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 13px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s ease;
    z-index: 9999;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { border-left-color: var(--danger); }
</style>
</head>
<body>
<div id="layout">

  <!-- ── TOP BAR ── -->
  <div id="topbar">
    <a class="logo" href="/drive" id="back-btn">
      <img src="/assets/Zentra_Core_Logo_NBG.png" alt="z">
      Zentra Drive
    </a>
    <div class="tab-bar">
      <div class="tab" id="file-tab">
        <span class="dot" id="modified-dot"></span>
        <span id="tab-filename">{{ filename }}</span>
        <span class="lang-badge" id="lang-badge">{{ language }}</span>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-drive" onclick="window.location='/drive'">← Drive</button>
      <button class="btn btn-save" id="save-btn" disabled>
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4.5L10.5 1H2Zm0 1h8v3h3v10H2V2Zm6 7a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/></svg>
        Save (Ctrl+S)
      </button>
    </div>
  </div>

  <!-- ── EDITOR ── -->
  <div id="editor-container">
    <div id="monaco-editor"></div>
  </div>

  <!-- ── STATUS BAR ── -->
  <div id="statusbar">
    <span>✏️ Zentra Code Editor</span>
    <span class="sep">|</span>
    <span id="status-lang">{{ language }}</span>
    <span class="sep">|</span>
    <span id="status-enc">UTF-8</span>
    <span class="sep">|</span>
    <span id="status-cursor">Ln 1, Col 1</span>
    <span id="status-msg"></span>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<!-- ── Monaco Loader ── -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
<script>
const FILE_PATH  = {{ file_path | tojson }};
const LANGUAGE   = {{ language  | tojson }};
const THEME      = {{ theme     | tojson }};
const WORD_WRAP  = {{ word_wrap | tojson }};
const SPELL_CHK  = {{ spell_check | tojson | lower }};

let editor, originalContent;
let isModified = false;

// ── Monaco Bootstrap ─────────────────────────────────────────────────
require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' } });
require(['vs/editor/editor.main'], function() {

  // 1. Define a extra Zentra-Dark theme
  monaco.editor.defineTheme('zentra-dark', {
    base: 'vs-dark',
    inherit: true,
    rules: [],
    colors: {
      'editor.background': '#0d1117',
      'editor.lineHighlightBackground': '#161b22',
      'editorLineNumber.foreground': '#484f58',
      'editorLineNumber.activeForeground': '#8b949e',
      'editor.selectionBackground': '#264f78',
      'editor.inactiveSelectionBackground': '#1f3a5f',
    }
  });

  // 2. Create editor
  editor = monaco.editor.create(document.getElementById('monaco-editor'), {
    value: 'Loading file…',
    language: LANGUAGE,
    theme: 'zentra-dark',
    fontFamily: "'JetBrains Mono', 'Fira Code', 'Consolas', monospace",
    fontSize: 14,
    lineHeight: 22,
    minimap: { enabled: true, maxColumn: 80 },
    wordWrap: WORD_WRAP,
    automaticLayout: true,
    scrollBeyondLastLine: false,
    renderLineHighlight: 'all',
    cursorBlinking: 'smooth',
    cursorSmoothCaretAnimation: 'on',
    smoothScrolling: true,
    bracketPairColorization: { enabled: true },
    guides: { bracketPairs: true, indentation: true },
    renderWhitespace: 'trailing',
    tabSize: 4,
    insertSpaces: true,
    folding: true,
    foldingHighlight: true,
    showFoldingControls: 'always',
    glyphMargin: true,
    overviewRulerBorder: false,
    scrollbar: {
      vertical: 'auto',
      horizontal: 'auto',
      useShadows: false,
    }
  });

  // 3. Load file content via REST
  fetch(`/drive/api/editor/read?path=${encodeURIComponent(FILE_PATH)}`)
    .then(r => r.json())
    .then(data => {
      if (!data.ok) {
        editor.setValue(`// ERROR loading file:\n// ${data.error}`);
        showToast(data.error, true);
        return;
      }
      originalContent = data.content;
      editor.setValue(data.content);
      // Update language if server disagrees
      if (data.language !== LANGUAGE) {
        monaco.editor.setModelLanguage(editor.getModel(), data.language);
        document.getElementById('lang-badge').textContent = data.language;
        document.getElementById('status-lang').textContent = data.language;
      }
      setMsg('');
    })
    .catch(e => {
      editor.setValue(`// Connection error: ${e}`);
      showToast('Connection error', true);
    });

  // 4. Track modifications
  editor.onDidChangeModelContent(() => {
    const changed = editor.getValue() !== originalContent;
    if (changed !== isModified) {
      isModified = changed;
      document.getElementById('file-tab').classList.toggle('modified', changed);
      document.getElementById('save-btn').disabled = !changed;
      document.title = (changed ? '● ' : '') + '{{ filename }} — Zentra Editor';
    }
  });

  // 5. Cursor position in status bar
  editor.onDidChangeCursorPosition(e => {
    const pos = e.position;
    document.getElementById('status-cursor').textContent = `Ln ${pos.lineNumber}, Col ${pos.column}`;
  });

  // 6. Ctrl+S save keybinding
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, saveFile);

  // 7. Spell check overlay (browser native, minimal impact)
  if (SPELL_CHK) {
    const ta = editor.getDomNode().querySelector('textarea');
    if (ta) { ta.spellcheck = true; ta.lang = 'en'; }
  }
});

// ── Save ──────────────────────────────────────────────────────────────
function saveFile() {
  if (!editor || !isModified) return;
  const content = editor.getValue();
  document.getElementById('save-btn').disabled = true;
  setMsg('Saving…', 'saving');

  fetch('/drive/api/editor/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: FILE_PATH, content })
  })
  .then(r => r.json())
  .then(data => {
    if (data.ok) {
      originalContent = content;
      isModified = false;
      document.getElementById('file-tab').classList.remove('modified');
      document.title = '{{ filename }} — Zentra Editor';
      showToast('✓ File saved successfully.');
      setMsg('Saved ✓', 'ok');
      setTimeout(() => setMsg(''), 3000);
    } else {
      showToast(data.error || 'Save failed', true);
      setMsg('Save failed!', 'err');
      document.getElementById('save-btn').disabled = false;
    }
  })
  .catch(e => {
    showToast('Network error: ' + e, true);
    setMsg('Error', 'err');
    document.getElementById('save-btn').disabled = false;
  });
}

document.getElementById('save-btn').addEventListener('click', saveFile);

// ── Helpers ───────────────────────────────────────────────────────────
function setMsg(text, cls = '') {
  const el = document.getElementById('status-msg');
  el.textContent = text;
  el.className = cls;
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isError ? 'error' : '';
  void t.offsetWidth; // force reflow
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

// ── Warn before leaving with unsaved changes ──────────────────────────
window.addEventListener('beforeunload', e => {
  if (isModified) {
    e.preventDefault();
    e.returnValue = 'You have unsaved changes. Are you sure?';
  }
});
</script>
</body>
</html>
