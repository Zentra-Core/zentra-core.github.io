<div id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <img src="/assets/Zentra_Core_Logo_NBG.png" alt="Zentra Logo">
      <span class="logo-text">ZENTRA</span>
    </div>
    <div class="logo-sub">Neural Cognitive Core</div>
  </div>
  <div class="status-pill">
    <div class="dot-pulse"></div>
    <div><div class="status-text">{{ t('webui_chat_backend') }}</div><div class="status-val" id="sb-backend">—</div></div>
  </div>
  <div class="status-pill">
    <div style="width:7px;height:7px;border-radius:50%;background:var(--accent2);box-shadow:0 0 6px var(--accent2);flex-shrink:0;"></div>
    <div style="overflow:hidden;"><div class="status-text">{{ t('webui_chat_model') }}</div><div class="status-val" id="sb-model" style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">—</div></div>
  </div>

  <!-- ── Audio Controls ── -->
  <div class="audio-controls">
    <div class="sidebar-label" style="padding:0 2px;margin-bottom:8px;">🔊 AUDIO</div>
    <div class="audio-toggle-row">
      <button class="audio-toggle-btn" id="mic-btn" onclick="toggleMic()" title="Toggle Microphone (F4)">
        🎤 <span id="mic-label">MIC</span>
      </button>
      <button class="audio-toggle-btn" id="tts-btn" onclick="toggleTTS()" title="Toggle Voice Output (F6)">
        🔊 <span id="tts-label">TTS</span>
      </button>
      <button class="audio-toggle-btn" id="ptt-btn" onclick="togglePTT()" title="Toggle Push-To-Talk (F8)">
        ⌨️ <span id="ptt-label">PTT</span>
      </button>
    </div>
      <button id="sidebar-stop-voice-btn" onclick="stopVoice()" title="Stop Voice (ESC)" style="
        display:none; margin:0 0 8px; width:100%; padding:6px 10px;
        background:rgba(248,113,113,.15); border:1px solid rgba(248,113,113,.4);
        border-radius:8px; color:var(--red); font-size:12px; cursor:pointer;
        transition:opacity .2s;">
      ⏹ Stop Voice
    </button>
    <div class="mode-label">INPUT ROUTING</div>
    <select class="mode-selector" id="stt-source-select" onchange="setAudioRouting('stt_source', this.value)" title="Choose where Zentra listens">
      <option value="system">🖥️ PC Mic (Local)</option>
      <option value="web">🌐 Web Browser</option>
    </select>
    <div class="mode-label" style="margin-top:8px;">OUTPUT ROUTING</div>
    <select class="mode-selector" id="tts-dest-select" onchange="setAudioRouting('tts_destination', this.value)" title="Choose where Zentra speaks">
      <option value="system">🖥️ PC Speakers</option>
      <option value="web">🌐 Web Audio</option>
    </select>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">{{ t('webui_chat_nav') }}</div>
    <button class="sidebar-btn active" onclick="clearChat()"><span class="icon">💬</span> {{ t('webui_chat_new') }}</button>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">{{ t('webui_chat_active_plugins') }}</div>
    <div id="sb-plugins"><div style="font-size:12px;color:var(--muted);padding:4px 6px;">{{ t('webui_chat_loading') }}</div></div>
  </div>
  <div class="sidebar-footer">
    <div style="font-size:11px;color:var(--muted);text-align:center;">Zentra Core — Web Interface<br><span style="color:var(--accent)">{{ t('webui_chat_local_port') }}</span></div>
  </div>
</div>
