<!-- LOGS PANEL -->
<div id="tab-logs" class="panel">
  <div class="card">
    <div class="card-title">{{ t('webui_conf_logs_title') }}</div>
    <p style="font-size:13px; color:var(--muted); margin-bottom:16px;">{{ t('webui_conf_logs_help') }}</p>
    
    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px solid var(--border);">
      <div class="field">
        <label>{{ t('webui_conf_logs_web_level') }}</label>
        <select id="web-log-level">
          <option value="BOTH">Both (Info & Debug)</option>
          <option value="INFO">Info Only</option>
          <option value="DEBUG">Debug Only</option>
        </select>
      </div>
      <div class="field">
        <label>{{ t('webui_conf_logs_web_max') }}</label>
        <input type="number" id="web-log-max" value="500" min="5" max="2000">
      </div>
      <div class="field">
        <label>{{ t('webui_conf_logs_web_autoscroll') }}</label>
        <div class="toggle-wrap">
          <input type="checkbox" id="web-log-autoscroll" checked>
          <span class="toggle-slider"></span>
        </div>
      </div>
      <div class="field">
        <label>{{ t('webui_conf_logs_web_split') }}</label>
        <div class="toggle-wrap">
          <input type="checkbox" id="web-log-split" onchange="toggleLogSplit()">
          <span class="toggle-slider"></span>
        </div>
      </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <div style="font-size:12px; color:var(--muted);">Streaming: <span id="log-status" class="val-warn">Waiting...</span></div>
      <button class="btn btn-secondary" style="padding:4px 12px; font-size:11px;" onclick="clearLogConsole()">{{ t('webui_chat_btn_clear') }}</button>
    </div>

    <div id="log-wrapper" class="log-container">
      <div id="log-group-info" style="display:flex; flex-direction:column; flex:1;">
        <div class="log-label-split">Info / Error / Warning</div>
        <div id="log-console">
          <div style="color:var(--muted)">Clicca sulla tab Logs per avviare il monitoraggio...</div>
        </div>
      </div>
      <div id="log-group-debug" style="display:none; flex-direction:column; flex:1;">
        <div class="log-label-split">Debug</div>
        <div id="log-console-debug"></div>
      </div>
    </div>
  </div>
</div>
