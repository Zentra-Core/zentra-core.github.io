<!-- MEDIA PANEL -->
<div id="tab-media" class="panel">
  <div class="card" id="card-image-gen">
    <div class="card-title">🎨 Image Generation</div>
    <div class="grid-2">
      <div class="field">
        <label>Provider</label>
        <select id="igen-provider" onchange="onProviderChanged()">
          <option value="pollinations">Pollinations.ai (Free)</option>
          <option value="airforce">Airforce API (Free/Experimental)</option>
          <option value="gemini">Google Gemini Imagen</option>
          <option value="openai">OpenAI DALL-E</option>
          <option value="stability">Stability.ai</option>
        </select>
      </div>
      <div class="field">
        <label>Model <button onclick="refreshImageModels()" style="margin-left:8px;padding:2px 10px;font-size:11px;border:1px solid var(--border);background:var(--bg3);color:var(--text);border-radius:6px;cursor:pointer;">&#8635; Refresh</button></label>
        <select id="igen-model"><option>flux</option></select>
        <span id="igen-model-status" style="font-size:11px;color:var(--muted);"></span>
      </div>
      <div class="field"><label>Width (px)</label><input type="number" id="igen-width" min="256" max="2048" step="64"></div>
      <div class="field"><label>Height (px)</label><input type="number" id="igen-height" min="256" max="2048" step="64"></div>
    </div>
    <div class="field" id="igen-apikey-row" style="margin-top:10px;display:none;">
      <label id="igen-apikey-label">API Key</label>
      <input type="password" id="igen-apikey" placeholder="sk-...">
      <small style="color:var(--muted);font-size:11px;">Key also accepted from .env file.</small>
    </div>
    <div class="toggle-row">
      <div class="toggle-info" style="font-weight:600; color:var(--text);">Enable Image Generation</div>
      <label class="switch"><input type="checkbox" id="igen-enabled"><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <div class="toggle-info">Remove Logo/Watermark (Pollinations only)</div>
      <label class="switch"><input type="checkbox" id="igen-nologo"><span class="slider"></span></label>
    </div>
  </div>

  <!-- Media Vault -->
  <div class="card" id="card-media-vault">
    <div class="card-title">🔐 Media Vault & Privacy</div>
    <p style="font-size:13px; color:var(--muted); margin-bottom:16px;">
      Manage the images generated and saved by the AI on your local disk.
    </p>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-secondary" onclick="openMediaVault()">📂 Open Storage Folder</button>
      <button class="btn btn-secondary" style="background:rgba(248,113,113,0.1); border-color:rgba(248,113,113,0.3); color:var(--red);" onclick="clearMediaVault()">🗑️ Clear All Generated Media</button>
    </div>
  </div>
</div>
