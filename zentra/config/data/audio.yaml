# ── Zentra Audio Subsystem Configuration ──
# Manages the vocal input (microphone) and sound output (speakers, TTS).

# Hardware index and name for Speakers or Headphones (Playback).
# Will be used to route system audio if console mode is active.
output_device_index: 4
output_device_name: Microsoft Sound Mapper - Output

# Hardware index and name for the Microphone (Recording).
# Will be used to listen to the user's voice commands.
input_device_index: 1
input_device_name: Microfono (Realtek High Definit

# If enabled, it will automatically detect and set the system's default 
# devices, temporarily ignoring the custom indexes.
auto_select: false

# If enabled, emits a short beep on startup to verify that 
# the speakers are connected and working.
test_on_startup: true

# If the specified peripheral fails, it automatically falls back 
# to the available default hardware.
fallback_on_error: true

# Emits a beep when you manually switch from one peripheral to another.
beep_on_select: true
last_scan: '2026-03-29 06:31:16'

# Enable or disable the Text-To-Speech (TTS) Synthesizer globally.
# If false, Zentra will only respond via written text.
voice_status: true

# ── Piper TTS Configuration (Local Voice Engine) ──
# Absolute path of the piper executable for text reading.
piper_path: C:\piper\piper.exe
# Path to the phonetic and sound model (e.g., it_IT-paola-medium.onnx).
onnx_model: C:\piper\it_IT-paola-medium.onnx
# Reading speed multiplier (e.g., 1.2 = 20% faster).
speed: 1.2
# Noise configuration variables for Piper. Modifying them alters the timbre.
noise_scale: 0.817
noise_w: 0.9
# Silence pause automatically inserted between one sentence and another.
sentence_silence: 0.1

# ── Microphone and STT Configuration (Listening Engine) ──
# Enable continuous listening of the user's voice.
listening_status: true

# Sensitivity or energy threshold required to trigger voice recording. 
# Increase if the microphone picks up too much background noise.
energy_threshold: 450

# The seconds of silence that must pass before considering the end of the spoken sentence.
silence_timeout: 5

# How many seconds to record continuously without pauses (maximum prolonged listening limit).
phrase_limit: 15

# ── Push-To-Talk (Walkie-Talkie Mode) ──
# If enabled (true), the AI will only listen if the specified PTT key combination is currently pressed.
push_to_talk: true
ptt_hotkey: ctrl+shift

# ── Audio Data Routing and Paths ──
# "system" if the voice is to be transcribed by the local daemon (Whisper).
# Otherwise, other channels like "web".
stt_source: system

# "system" to output voice directly from the connected PC's speakers.
# "web" to encapsulate the WAV file and play it inside the browser via the integrated WebUI.
tts_destination: web

# Status of the audio playback system (console mode means bypassing web redirects).
audio_mode: console
