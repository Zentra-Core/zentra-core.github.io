<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} - Zentra Docs</title>
    <link rel="icon" type="image/png" href="/assets/Zentra_Core_Logo_NBG%20-%20SQR.png">
    <link rel="stylesheet" href="/assets/css/core/variables.css?v={{ version }}">
    <link rel="stylesheet" href="/assets/css/index.css?v={{ version }}">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js for Code Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --sidebar-width: 300px;
            --accent: var(--accent);
            --accent2: var(--accent2);
            --bg: var(--bg);
            --surface: var(--bg2);
            --text: var(--text);
            --sidebar-bg: var(--bg);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Style */
        .docs-sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .sidebar-header img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .sidebar-header .title {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 1px;
            color: var(--accent);
        }

        .nav-section {
            margin-bottom: 20px;
        }

        .nav-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent2);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            padding-left: 10px;
            opacity: 0.7;
        }

        .nav-group-selector {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            padding: 5px;
            background: var(--glass);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .group-btn {
            flex: 1;
            padding: 8px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--muted);
            border: none;
            background: transparent;
        }

        .group-btn:hover { color: #ccc; }
        .group-btn.active {
            background: var(--surface);
            color: var(--accent);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .chapter-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .chapter-item {
            display: block;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            color: var(--muted);
            font-size: 13px;
            transition: all 0.2s;
            margin-bottom: 2px;
            border-left: 2px solid transparent;
        }

        .chapter-item:hover {
            color: var(--text);
            background: var(--glass);
        }

        .chapter-item.active {
            color: var(--accent);
            background: rgba(var(--accent-rgb), 0.08);
            border-left-color: var(--accent);
            font-weight: 500;
        }

        /* Language Switcher */
        .lang-switcher {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        .lang-link {
            text-decoration: none;
            color: var(--muted);
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            background: var(--glass);
            transition: all 0.2s;
        }
        .lang-link:hover, .lang-link.active {
            color: var(--accent);
            background: rgba(var(--accent-rgb), 0.1);
        }

        /* Content Area */
        .search-container {
            margin: 15px 0;
            position: relative;
        }
        .search-input {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px 10px 35px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .search-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 14px;
        }

        .search-results-overlay {
            position: fixed;
            top: 0; left: var(--sidebar-width); right: 0; bottom: 0;
            background: var(--bg);
            z-index: 150;
            padding: 50px;
            display: none;
            overflow-y: auto;
        }
        .search-result-item {
            background: var(--surface);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid var(--border);
        }
        .search-result-item:hover { transform: translateY(-3px); border-color: var(--accent); }
        .search-result-title { color: var(--accent); font-weight: 600; font-size: 18px; margin-bottom: 8px; }
        .search-result-snippet { color: var(--muted); font-size: 14px; line-height: 1.5; }
        .search-result-snippet b { color: var(--text); background: rgba(var(--accent-rgb), 0.2); padding: 0 2px; }

        .close-search {
            position: absolute;
            top: 30px; right: 40px;
            background: none; border: none; color: var(--muted);
            font-size: 24px; cursor: pointer;
        }
        .close-search:hover { color: white; }

        .docs-main {
            flex: 1;
            overflow-y: auto;
            padding: 40px 60px;
            box-sizing: border-box;
            background: radial-gradient(circle at top right, rgba(var(--accent-rgb), 0.03), transparent 400px);
            display: flex;
            flex-direction: column;
        }

        #content-target {
            max-width: 850px;
            margin: 0 auto 60px auto;
            width: 100%;
            line-height: 1.6;
        }

        /* Markdown Styles */
        #content-target h1 { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-bottom: 30px; }
        #content-target h2 { color: var(--accent2); margin-top: 45px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        #content-target h3 { color: var(--accent); filter: brightness(1.2); margin-top: 30px; }
        #content-target p { margin-bottom: 18px; color: var(--text); opacity: 0.9; }
        #content-target code { background: var(--glass-b); padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.9em; color: var(--accent); }
        #content-target pre { background: var(--bg); padding: 20px; border-radius: 12px; overflow-x: auto; border: 1px solid var(--border); margin: 20px 0; }
        #content-target pre code { background: transparent; padding: 0; color: inherit; }
        #content-target blockquote { border-left: 4px solid var(--accent); background: var(--glass); margin: 25px 0; padding: 15px 25px; color: var(--muted); font-style: italic; }
        #content-target table { width: 100%; border-collapse: collapse; margin: 30px 0; font-size: 14px; }
        #content-target th, #content-target td { border: 1px solid var(--border); padding: 14px; text-align: left; }
        #content-target th { background: var(--glass); color: var(--accent); }
        #content-target img { max-width: 100%; border-radius: 12px; margin: 30px 0; box-shadow: var(--shadow); }

        /* Pagination Buttons */
        .pagination {
            max-width: 850px;
            margin: auto auto 40px auto;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding-top: 30px;
            border-top: 1px solid var(--border);
        }

        .pag-btn {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: var(--muted);
            transition: all 0.2s;
            max-width: 45%;
        }

        .pag-btn:hover { color: var(--accent); }
        .pag-btn .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .pag-btn .title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pag-btn.prev { text-align: left; }
        .pag-btn.next { text-align: right; }

        .back-link {
            display: block;
            margin-top: 20px;
            padding: 10px;
            text-align: center;
            background: var(--glass);
            border-radius: 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .back-link:hover { background: var(--surface); color: white; }

        #loading-overlay {
            position: fixed;
            top: 0; left: var(--sidebar-width); right: 0; bottom: 0;
            background: var(--bg);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        @media (max-width: 900px) {
            :root { --sidebar-width: 240px; }
            .docs-main { padding: 30px; }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .docs-sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .docs-main { padding: 20px; }
            #loading-overlay { left: 0; }
        }
    </style>
</head>
<body>
<script>
  (function() {
    var autoTheme = localStorage.getItem('zentra-ui-auto-theme') === 'true';
    var savedTheme = localStorage.getItem('zentra-ui-theme') || 'cyberpunk';
    var theme = 'cyberpunk';
    if (autoTheme) {
      theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'cyberpunk' : 'light';
    } else {
      theme = savedTheme;
    }
    if (theme !== 'default') {
      document.body.classList.add('theme-' + theme);
    }
  })();
</script>

<div class="docs-sidebar">
    <div class="sidebar-header">
        <img src="/assets/Zentra_Core_Logo_NBG%20-%20SQR.png" alt="Zentra Logo">
        <div class="title">ZENTRA DOCS</div>
    </div>

    <div class="lang-switcher">
        <a href="javascript:void(0)" onclick="switchLang('en')" id="lang-en" class="lang-link">EN</a>
        <a href="javascript:void(0)" onclick="switchLang('it')" id="lang-it" class="lang-link">IT</a>
        <a href="javascript:void(0)" onclick="switchLang('es')" id="lang-es" class="lang-link">ES</a>
    </div>

    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" id="docs-search" class="search-input" placeholder="Search docs..." onkeyup="handleSearch(event)">
    </div>

    <div class="nav-group-selector">
        <button id="btn-group-user" class="group-btn" onclick="switchGroup('user')">OPERATING</button>
    </div>

    <div class="nav-section">
        <div class="nav-label" id="chapters-label">Chapters</div>
        <div id="chapters-container" class="chapter-list">
            <!-- Dynamic Chapters -->
        </div>
    </div>

    <div class="nav-section">
        <div class="nav-label">Resources</div>
        <a href="https://github.com/Zentra-Core/zentra-core.github.io/wiki/" target="_blank" class="chapter-item">
            GitHub Wiki ↗
        </a>
        <a href="javascript:void(0)" onclick="window.open('/api/docs/unified/generate?group=' + currentGroup + '&lang=' + currentLang)" class="chapter-item" style="color:var(--accent); border-color:var(--accent); background:rgba(102, 252, 241, 0.05); margin-top:10px;">
            📥 Generate Dynamic Guide
        </a>
    </div>

    <a href="/chat" class="back-link">↩ Back to Chat</a>
</div>

<main class="docs-main">
    <div id="search-results" class="search-results-overlay">
        <button class="close-search" onclick="closeSearch()">✕</button>
        <h2 id="search-query-display" style="margin-bottom: 30px;">Search Results for "..."</h2>
        <div id="results-list"></div>
    </div>

    <div id="loading-overlay">
        <div style="color: var(--accent); font-weight: 600; letter-spacing: 2px; animation: pulse 1.5s infinite;">LOADING...</div>
    </div>
    <article id="content-target">
        <!-- Content injected here -->
    </article>

    <div class="pagination" id="pagination">
        <a href="#" class="pag-btn prev" id="pag-prev" style="visibility: hidden;">
            <span class="label">Previous</span>
            <span class="title" id="pag-prev-title">---</span>
        </a>
        <a href="#" class="pag-btn next" id="pag-next" style="visibility: hidden;">
            <span class="label">Next</span>
            <span class="title" id="pag-next-title">---</span>
        </a>
    </div>
</main>

<script>
    let currentGroup = "{{ group }}";
    let currentChapter = "{{ initial_chapter }}";
    let currentLang = "{{ lang }}";
    let chapters = [];

    async function loadChapters() {
        try {
            const resp = await fetch(`/api/docs/list/${currentGroup}?lang=${currentLang}`);
            chapters = await resp.json();
            renderSidebar();
            if (currentChapter) {
                loadContent(currentChapter);
            } else if (chapters.length > 0) {
                loadContent(chapters[0].id);
            }
        } catch (e) {
            console.error("Error loading chapters:", e);
        }
    }

    function renderSidebar() {
        const container = document.getElementById('chapters-container');
        container.innerHTML = '';
        
        chapters.forEach((ch, index) => {
            const a = document.createElement('a');
            a.href = `javascript:void(0)`;
            a.className = `chapter-item ${ch.id === currentChapter ? 'active' : ''}`;
            a.textContent = ch.name;
            a.onclick = () => loadContent(ch.id);
            container.appendChild(a);
        });

        // Update Group Tabs
        document.getElementById('btn-group-user').classList.toggle('active', currentGroup === 'user');
        const techBtn = document.getElementById('btn-group-tech');
        if (techBtn) techBtn.classList.toggle('active', currentGroup === 'tech');

        // Update Lang Links
        document.querySelectorAll('.lang-link').forEach(el => {
            el.classList.toggle('active', el.id === `lang-${currentLang}`);
        });
    }

    async function loadContent(chapterId) {
        if (!chapterId) return;
        currentChapter = chapterId;
        
        const overlay = document.getElementById('loading-overlay');
        overlay.style.display = 'flex';

        try {
            const resp = await fetch(`/api/docs/content/${currentGroup}/${chapterId}?lang=${currentLang}`);
            const data = await resp.json();
            
            if (data.error) {
                document.getElementById('content-target').innerHTML = `<h1>Error</h1><p>${data.error}</p>`;
            } else {
                const target = document.getElementById('content-target');
                target.innerHTML = marked.parse(data.content);
                
                // Highlight code
                target.querySelectorAll('pre code').forEach((el) => {
                    hljs.highlightElement(el);
                 });
                
                // Scroll to top
                document.querySelector('.docs-main').scrollTop = 0;
            }
            
            updatePagination();
            renderSidebar();
            
            // Update URL without refresh
            const newUrl = `${window.location.pathname}?group=${currentGroup}&chapter=${chapterId}&lang=${currentLang}`;
            window.history.pushState({ group: currentGroup, chapter: chapterId, lang: currentLang }, '', newUrl);

        } catch (e) {
            console.error("Error loading content:", e);
        } finally {
            overlay.style.display = 'none';
        }
    }

    // --- Search Logic ---
    let searchTimeout = null;

    function handleSearch(e) {
        const query = e.target.value.trim();
        clearTimeout(searchTimeout);
        
        if (query.length < 2) {
            if (query.length === 0) closeSearch();
            return;
        }
        
        searchTimeout = setTimeout(() => {
            performSearch(query);
        }, 300);
    }

    async function performSearch(query) {
        document.getElementById("search-results").style.display = "block";
        document.getElementById("search-query-display").innerText = `Results for "${query}"`;
        const list = document.getElementById("results-list");
        list.innerHTML = `<div style="color: #666; padding: 20px;">Searching...</div>`;
        
        try {
            const resp = await fetch(`/api/docs/search?group=${currentGroup}&query=${encodeURIComponent(query)}&lang=${currentLang}`);
            const results = await resp.json();
            
            if (results.length === 0) {
                list.innerHTML = `<div style="color: #666; padding: 20px;">No results found for "${query}".</div>`;
                return;
            }
            
            list.innerHTML = results.map(r => `
                <div class="search-result-item" onclick="goToSearchResult('${r.id}')">
                    <div class="search-result-title">${r.title}</div>
                    <div class="search-result-snippet">${highlightQuery(r.snippet, query)}</div>
                </div>
            `).join('');
        } catch (e) {
            list.innerHTML = `<div style="color: #f66; padding: 20px;">Error during search.</div>`;
        }
    }

    function highlightQuery(text, query) {
        const regex = new RegExp(`(${query})`, 'gi');
        return text.replace(regex, '<b>$1</b>');
    }

    function closeSearch() {
        document.getElementById("search-results").style.display = "none";
        document.getElementById("docs-search").value = "";
    }

    function goToSearchResult(chapterId) {
        closeSearch();
        loadContent(chapterId);
    }

    function updatePagination() {
        const idx = chapters.findIndex(c => c.id === currentChapter);
        const prev = chapters[idx - 1];
        const next = chapters[idx + 1];

        const prevEl = document.getElementById('pag-prev');
        if (prev) {
            prevEl.style.visibility = 'visible';
            document.getElementById('pag-prev-title').textContent = prev.name;
            prevEl.onclick = (e) => { e.preventDefault(); loadContent(prev.id); };
        } else {
            prevEl.style.visibility = 'hidden';
        }

        const nextEl = document.getElementById('pag-next');
        if (next) {
            nextEl.style.visibility = 'visible';
            document.getElementById('pag-next-title').textContent = next.name;
            nextEl.onclick = (e) => { e.preventDefault(); loadContent(next.id); };
        } else {
            nextEl.style.visibility = 'hidden';
        }
    }

    function switchGroup(group) {
        if (group === currentGroup) return;
        currentGroup = group;
        currentChapter = ""; // Load first chapter of new group
        loadChapters();
    }

    function switchLang(lang) {
        if (lang === currentLang) return;
        currentLang = lang;
        loadChapters(); // Reload titles and content
    }

    // Handle browser back/forward
    window.onpopstate = function(event) {
        if (event.state) {
            currentGroup = event.state.group;
            currentChapter = event.state.chapter;
            currentLang = event.state.lang;
            loadChapters();
        }
    };

    document.addEventListener('DOMContentLoaded', loadChapters);
</script>

<style>
    @keyframes pulse {
        0% { opacity: 0.4; }
        50% { opacity: 1; }
        100% { opacity: 0.4; }
    }
</style>

</body>
</html>
