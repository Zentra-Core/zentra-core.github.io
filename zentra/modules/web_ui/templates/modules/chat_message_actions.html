{#
  MODULE: chat_message_actions.html
  PURPOSE: CSS styles for inline message action bar (shown below AI/user messages)
  This file is included by chat.html via Jinja2 {% include %}
#}
<style>
/* ── Message Action Bar ─────────────────────────────────────────── */
.msg-actions {
  display: none;
  gap: 4px;
  margin-top: 6px;
  padding: 0 2px;
  flex-wrap: wrap;
}

.msg:hover .msg-actions,
.msg-actions.visible {
  display: flex;
}

.msg-action-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--glass);
  color: var(--muted);
  font-family: inherit;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  user-select: none;
}

.msg-action-btn:hover {
  background: var(--glass-b);
  color: var(--text);
  border-color: var(--accent);
}

.msg-action-btn.danger:hover {
  background: rgba(var(--red-rgb),.12);
  border-color: rgba(var(--red-rgb),.4);
  color: var(--red);
}

/* Edit mode overlay */
.msg-edit-wrap {
  display: none;
  flex-direction: column;
  gap: 8px;
  margin-top: 8px;
}

.msg-edit-wrap.active { display: flex; }

.msg-edit-textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--accent);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  padding: 10px 12px;
  resize: vertical;
  min-height: 60px;
  outline: none;
}

.msg-edit-controls {
  display: flex;
  gap: 6px;
  justify-content: flex-end;
}

.msg-edit-confirm {
  padding: 5px 14px;
  border-radius: 6px;
  border: none;
  background: var(--accent);
  color: white;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: filter .2s;
}
.msg-edit-confirm:hover { filter: brightness(1.15); }

.msg-edit-cancel {
  padding: 5px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--glass);
  color: var(--muted);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
}
.msg-edit-cancel:hover { color: var(--text); }

/* Toast notification */
#chat-toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 18px;
  font-size: 13px;
  color: var(--text);
  opacity: 0;
  transition: opacity .25s, transform .25s;
  pointer-events: none;
  z-index: 999;
}
#chat-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
