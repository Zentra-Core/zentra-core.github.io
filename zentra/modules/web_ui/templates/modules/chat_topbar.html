<div id="topbar">
  <div style="display:flex; align-items:center; gap:15px;">
    <button id="sidebar-toggle-btn" class="desktop-only" onclick="toggleSidebarDesktop()" title="Toggle Sidebar" style="background:none; border:none; color:var(--text); font-size:20px; cursor:pointer; display:flex; align-items:center; transition: color .2s;">☰</button>
    <div id="model-badge" style="display:flex; align-items:center; gap:8px;">
      <div id="tb-status-dot" style="width:10px; height:10px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green);"></div>
      <span id="tb-model" style="font-size: 13px; font-weight: 500;">{{ t('webui_chat_loading') }}</span>
    </div>
    <style>@keyframes pulseDot { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.1); box-shadow: 0 0 12px currentColor; } 100% { opacity: 1; transform: scale(1); } } #tb-status-dot.pulsing { animation: pulseDot 2s infinite; } .mode-chip-autowipe { border-color: rgba(var(--yellow-rgb),0.5) !important; color: var(--yellow) !important; background: rgba(var(--yellow-rgb),0.1) !important; } .mode-chip-incognito { border-color: rgba(var(--accent2-rgb),0.5) !important; color: var(--accent2) !important; background: rgba(var(--accent2-rgb),0.1) !important; }</style>
  </div>
  <div class="topbar-chips">
    <div id="topbar-mode-chip" style="display:none;"></div>
    <div class="topbar-chip" id="chip-mic">🎤 MIC: —</div>
    <div class="topbar-chip" id="chip-tts">🔊 TTS: —</div>
    <div class="topbar-chip" id="chip-ptt">⌨️ PTT: —</div>
    <button id="topbar-stop-voice-btn" class="topbar-chip on" style="display:none; cursor:pointer; background:rgba(var(--red-rgb),0.2); border-color:var(--red); color:var(--red);" onclick="stopVoice()">⏹ Stop Voice</button>
    <a href="/zentra/config/ui" target="_blank" class="topbar-link">⚙️ <span>{{ t('webui_chat_config') }}</span></a>
    <a href="/drive" target="_blank" class="topbar-link">🗂️ <span>{{ t('hub_mod_drive') or 'Drive' }}</span></a>
  </div>
</div>
