<div id="tab-studio" class="panel">
  <div class="card">
    <div class="card-title">🛠️ Zentra Plugin Studio (Beta)</div>
    <p style="font-size:13px; color:var(--muted); margin-bottom:20px;">Create and edit "live" plugins directly from your browser. Changes are saved as first-class Python modules.</p>

    <div style="display:flex; gap:20px; flex-wrap:wrap;">
      <!-- LEFT: Plugin List / New -->
      <div style="flex: 0 0 250px; background:var(--bg2); border:1px solid var(--border); padding:15px; border-radius:8px;">
        <div class="card-title" style="font-size:13px; margin-top:0;">Your Skills</div>
        <div id="studio-plugin-list" style="display:flex; flex-direction:column; gap:8px;">
          <button type="button" class="btn btn-secondary" style="width:100%; text-align:left; border:1px dashed var(--accent);">+ New Plugin</button>
          <div style="font-size:12px; color:var(--muted); padding:10px; border-radius:4px; background:var(--bg3);">
            No custom plugins yet.
          </div>
        </div>
      </div>

      <!-- RIGHT: IDE Area -->
      <div style="flex: 1; background:var(--bg2); border:1px solid var(--border); padding:15px; border-radius:8px;">
        <div class="field">
          <label>Plugin Tag</label>
          <input type="text" class="config-input" placeholder="e.g. CUSTOM_CMD">
        </div>
        <div class="field">
          <label>Description</label>
          <input type="text" class="config-input" placeholder="What does this plugin do?">
        </div>
        <div class="field" style="margin-top:20px;">
          <label>Python Logic (main.py)</label>
          <textarea class="config-input" style="height:400px; font-family:'JetBrains Mono', monospace; resize:vertical;" spellcheck="false">
import os

class MyTools:
    def __init__(self):
        self.tag = "CHANGE_ME"
        self.desc = "Example Plugin"

    def hello(self, name="User"):
        """Greets the user."""
        return f"Hello {name}, I am a live Zentra plugin!"

tools = MyTools()
          </textarea>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
          <button type="button" class="btn btn-secondary">Test Syntax</button>
          <button type="button" class="btn btn-primary">Deploy Plugin</button>
        </div>
      </div>
    </div>
  </div>
</div>
