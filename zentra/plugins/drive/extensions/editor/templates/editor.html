<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✏️ {{ filename }} — Zentra Editor</title>
<link rel="icon" type="image/png" href="/assets/Zentra_Core_Logo_NBG.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap">
<link rel="stylesheet" href="/editor_static/css/editor.css?v=3">
</head>
<body>
<div id="layout">

  <!-- ── TOP BAR ── -->
  <div id="topbar">
    <a class="logo" href="/drive" id="back-btn">
      <img src="/assets/Zentra_Core_Logo_NBG.png" alt="z">
      Zentra Drive
    </a>
    <div class="tab-bar">
      <div class="tab" id="file-tab">
        <span class="dot" id="modified-dot"></span>
        <span id="tab-filename">{{ filename }}</span>
        <span class="lang-badge" id="lang-badge">{{ language }}</span>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-drive" onclick="window.location='/drive'">← Drive</button>
      <button class="btn btn-save" id="save-btn" disabled>
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4.5L10.5 1H2Zm0 1h8v3h3v10H2V2Zm6 7a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/></svg>
        Save (Ctrl+S)
      </button>
    </div>
  </div>

  <!-- ── EDITOR ── -->
  <div id="editor-container">
    <div id="monaco-editor"></div>
  </div>

  <!-- ── STATUS BAR ── -->
  <div id="statusbar">
    <span>✏️ Zentra Code Editor</span>
    <span class="sep">|</span>
    <span id="status-lang">{{ language }}</span>
    <span class="sep">|</span>
    <span id="status-enc">UTF-8</span>
    <span class="sep">|</span>
    <span id="status-cursor">Ln 1, Col 1</span>
    <span id="status-msg"></span>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<!-- ── Monaco Loader ── -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
<script>
  window.FILE_PATH  = {{ file_path | tojson }};
  window.LANGUAGE   = {{ language  | tojson }};
  window.THEME      = {{ theme     | tojson }};
  window.WORD_WRAP  = {{ word_wrap | tojson }};
  window.SPELL_CHK  = {{ spell_check | tojson | lower }};
</script>
<script src="/editor_static/js/editor.js"></script>
</body>
</html>
