<!DOCTYPE html>
<html lang="{{ zconfig.language or 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Zentra Core - Security Check</title>
    <link rel="icon" type="image/png" href="/assets/Zentra_Core_Logo_NBG%20-%20SQR.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" media="print" onload="this.media='all'">
    <style>
        :root {
            --bg-color: #0b0c10;
            --surface-color: #1f2833;
            --primary-accent: #66fcf1;
            --secondary-accent: #45a29e;
            --text-main: #c5c6c7;
            --text-bright: #ffffff;
            --error-color: #ff4b4b;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at top right, rgba(69, 162, 158, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(102, 252, 241, 0.05), transparent 30%);
        }

        .login-container {
            background: rgba(31, 40, 51, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(102, 252, 241, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: 2px;
            margin: 0;
        }

        .logo-sub {
            font-size: 12px;
            color: var(--primary-accent);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 5px;
            display: block;
        }

        .error-message {
            background-color: rgba(255, 75, 75, 0.1);
            border-left: 3px solid var(--error-color);
            color: var(--error-color);
            padding: 10px 15px;
            font-size: 13px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: left;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: left;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-main);
            letter-spacing: 1px;
            font-weight: 600;
        }

        input {
            background: rgba(11, 12, 16, 0.5);
            border: 1px solid rgba(197, 198, 199, 0.2);
            color: var(--text-bright);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--secondary-accent);
            box-shadow: 0 0 0 2px rgba(69, 162, 158, 0.2);
            background: rgba(11, 12, 16, 0.8);
        }

        button {
            margin-top: 10px;
            background: linear-gradient(135deg, var(--secondary-accent), var(--primary-accent));
            color: var(--bg-color);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 252, 241, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 11px;
            color: rgba(197, 198, 199, 0.5);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-container">
            <h1 class="logo-text">ZENTRA</h1>
            <span class="logo-sub">Security Core</span>
        </div>

        {% if error %}
            <div class="error-message">
                ⚠ {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="input-group">
                <label for="username">Identificativo</label>
                <input type="text" id="username" name="username" placeholder="Username" required autocomplete="off" spellcheck="false" autofocus>
            </div>

            <div class="input-group">
                <label for="password">Codice Accesso</label>
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>

            <div style="display:flex; align-items:center; gap:8px; margin-top:4px;">
                <input type="checkbox" id="remember" name="remember" style="width:auto; margin:0;" checked>
                <label for="remember" style="text-transform:none; font-weight:400; color:#888;">Mantieni l'accesso per i prossimi avvii</label>
            </div>

            <button type="submit">Autentica</button>
        </form>

        <div class="footer-text">
            End-To-End Local Encryption
        </div>
    </div>

</body>
</html>
