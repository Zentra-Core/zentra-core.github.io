<!-- AUTOCODER PANEL -->
<div id="tab-autocoder" class="panel">
  <div class="card">
    <div class="card-title">AutoCoder Configuration</div>
    <div class="toggle-row">
      <div class="toggle-info">
        <strong>Attiva Modulo</strong>
        <p>Abilita o disabilita le capacità di scrittura del codice.</p>
      </div>
      <label class="switch">
        <input type="checkbox" id="plugin-autocoder-enabled">
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="toggle-row">
      <div class="toggle-info">
        <strong>Sandbox Only</strong>
        <p>Se attivo, Zentra potrà scrivere file solo nella cartella 'experimental'.</p>
      </div>
      <label class="switch">
        <input type="checkbox" id="plugin-autocoder-sandbox">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <div class="toggle-info">
        <strong>Lazy Loading</strong>
        <p>Carica il modulo solo quando necessario per risparmiare memoria.</p>
      </div>
      <label class="switch">
        <input type="checkbox" id="plugin-autocoder-lazy">
        <span class="slider"></span>
      </label>
    </div>
  </div>
</div>
