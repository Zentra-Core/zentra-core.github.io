<!-- LLM PANEL -->
<div id="tab-llm" class="panel">
  <div class="card">
    <div class="card-title">{{ t('webui_conf_llm_providers') }}</div>
    <div class="toggle-row">
      <div class="toggle-info">{{ t('webui_conf_llm_enable') }}<div class="toggle-sub">{{ t('webui_conf_llm_enable_sub') }}</div></div>
      <label class="switch"><input type="checkbox" id="llm-allow-cloud"><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <div class="toggle-info">LiteLLM Verbose Debug<div class="toggle-sub">Stampa log dettagliati di ogni richiesta AI (molto verboso)</div></div>
      <label class="switch"><input type="checkbox" id="llm-debug"><span class="slider"></span></label>
    </div>
  </div>
  <div class="card">
    <div class="card-title">{{ t('webui_conf_api_keys') }}</div>
    <div class="field"><label>OpenAI</label><input type="password" id="key-openai" placeholder="sk-..."></div>
    <div class="field"><label>Anthropic</label><input type="password" id="key-anthropic" placeholder="sk-ant-..."></div>
    <div class="field"><label>Groq</label><input type="password" id="key-groq" placeholder="gsk_..."></div>
    <div class="field"><label>Gemini</label><input type="password" id="key-gemini" placeholder="AIza..."></div>
    <small style="color:var(--muted); font-size:12px;">{{ t('webui_conf_api_keys_warn') }}</small>
  </div>
  <div class="card">
    <div class="card-title">{{ t('webui_conf_available_models') }}</div>
    <div class="field"><label>OpenAI</label><textarea id="models-openai" rows="4"></textarea></div>
    <div class="field"><label>Anthropic</label><textarea id="models-anthropic" rows="3"></textarea></div>
    <div class="field"><label>Groq</label><textarea id="models-groq" rows="5"></textarea></div>
    <div class="field"><label>Gemini</label><textarea id="models-gemini" rows="5"></textarea></div>
  </div>
</div>
