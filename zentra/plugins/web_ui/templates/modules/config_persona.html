<!-- PERSONA PANEL -->
<div id="tab-ia" class="panel">
  <div class="card">
    <div class="card-title">{{ t('webui_conf_persona_title') }}</div>
    <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 16px;">
        <div id="ia-avatar-wrapper" style="position: relative; width: 64px; height: 64px;">
            <img id="ia-avatar-preview" src="/assets/Zentra_Core_Logo_NBG.png" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 2px solid var(--border); background: var(--bg3);">
            <div id="ia-avatar-loading" style="display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.5); border-radius: 50%; align-items: center; justify-content: center; font-size: 10px;">...</div>
        </div>
        <div style="flex: 1;">
            <div class="field" style="margin-bottom: 8px;"><label>{{ t('webui_conf_persona') }}</label><select id="ia-personality"></select></div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button type="button" class="btn btn-secondary" style="font-size: 11px; padding: 4px 12px; flex: 1;" onclick="document.getElementById('ia-avatar-input').click()">{{ t('label_change_avatar') or 'Cambia Foto' }}</button>
                <div class="field" style="margin: 0; flex: 1;">
                    <select id="ia-avatar-size" style="padding: 4px; font-size: 11px;">
                        <option value="small">{{ t('label_size_small') }}</option>
                        <option value="medium" selected>{{ t('label_size_medium') }}</option>
                        <option value="large">{{ t('label_size_large') }}</option>
                    </select>

                </div>
            </div>
            <input type="file" id="ia-avatar-input" style="display: none;" accept="image/*" onchange="uploadAvatar()">
        </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">{{ t('label_special_instructions') }}</div>
    <div class="field">
      <textarea id="ia-instructions" rows="4" placeholder="Es: Sii sempre molto conciso ed evita gli asterischi..."></textarea>
      <div class="muted" style="font-size: 10px; margin-top: 4px; opacity: 0.7;">
        * Queste istruzioni sono <strong>Globali</strong>. Per logiche specifiche sui plugin, usa la scheda <strong>Routing</strong>.
      </div>
    </div>
    <div class="toggle-row">
      <div class="toggle-info">{{ t('label_save_special_instructions') }}</div>
      <label class="switch"><input type="checkbox" id="ia-save-instructions"><span class="slider"></span></label>
    </div>
    <div style="margin-top: 12px; text-align: right;">
      <button class="btn btn-secondary" onclick="document.getElementById('ia-instructions').value='';">{{ t('label_clear_special_instructions') }}</button>
    </div>
  </div>
</div>
