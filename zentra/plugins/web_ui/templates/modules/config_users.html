<div id="tab-users" class="panel">
  <div class="card">
    <div class="card-title">Users & Roles</div>
    <div class="row">
      <div class="group" style="flex:2;">
        <label>Registered Accounts</label>
        <div id="users-table-container" style="background:#1e2430; border:1px solid #444; border-radius:6px; padding:10px; min-height:100px;">
        <p style="color:#888; font-size:12px;">Caricamento utenti...</p>
      </div>
    </div>
    
    <div class="group" style="flex:1;">
      <label>Crea Nuovo Utente</label>
      <input type="text" id="new_user_name" class="input-modern" placeholder="Username" autocomplete="off" style="margin-bottom:8px;">
      <input type="password" id="new_user_pass" class="input-modern" placeholder="Password" style="margin-bottom:8px;">
      <select id="new_user_role" class="input-modern" style="margin-bottom:8px;">
        <option value="guest">Guest (Base)</option>
        <option value="admin">Admin (Master)</option>
      </select>
      <button type="button" class="btn btn-secondary" onclick="createUser()" style="width:100%;">+ Aggiungi Utente</button>
      </div>
    </div>
  </div>

  <script>
    async function loadUsersData() {
        const container = document.getElementById("users-table-container");
        try {
            const r = await fetch("/zentra/api/users");
            const res = await r.json();
            
            if (res.ok) {
                if (res.users.length === 0) {
                    container.innerHTML = `<p style="color:#888; font-size:13px;">Nessun utente trovato.</p>`;
                    return;
                }
                
                let html = `
                <table style="width:100%; border-collapse: collapse; text-align: left; font-size:13px;">
                    <thead>
                        <tr style="border-bottom: 1px solid #444; color:#66fcf1;">
                            <th style="padding: 8px;">ID</th>
                            <th style="padding: 8px;">Username</th>
                            <th style="padding: 8px;">Role</th>
                            <th style="padding: 8px; text-align:right;">Azioni</th>
                        </tr>
                    </thead>
                    <tbody>
                `;
                res.users.forEach(u => {
                    let actions = "";
                    if (u.username === "admin") {
                        actions = `<button type="button" class="btn btn-secondary" style="padding:4px 8px; font-size:11px;" onclick="promptChangePass('${u.username}')">Cambia Pass</button>`;
                    } else {
                         actions = `
                            <button type="button" class="btn btn-secondary" style="padding:4px 8px; font-size:11px; margin-right:4px;" onclick="promptChangePass('${u.username}')">Pass</button>
                            <button type="button" class="btn btn-secondary" style="padding:4px 8px; font-size:11px; background:#422; border-color:#633; color:#f88;" onclick="deleteUser('${u.username}')">Del</button>
                        `;
                    }

                    html += `
                        <tr style="border-bottom: 1px solid #333;">
                            <td style="padding: 8px; color:#aaa;">${u.id}</td>
                            <td style="padding: 8px; font-weight:bold;">${u.username}</td>
                            <td style="padding: 8px; color:#45a29e;">${u.role.toUpperCase()}</td>
                            <td style="padding: 8px; text-align:right;">${actions}</td>
                        </tr>
                    `;
                });
                html += `</tbody></table>`;
                container.innerHTML = html;
            } else {
                container.innerHTML = `<p style="color:#f88; font-size:13px;">Errore: ${res.error}</p>`;
            }
        } catch (e) {
            container.innerHTML = `<p style="color:#f88; font-size:13px;">Connessione persa.</p>`;
        }
    }

    async function createUser() {
        const u = document.getElementById("new_user_name").value;
        const p = document.getElementById("new_user_pass").value;
        const r = document.getElementById("new_user_role").value;
        if (!u || !p) { alert("Username e password obbligatori."); return; }

        try {
            const resp = await fetch("/zentra/api/users", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({username: u, password: p, role: r})
            });
            const res = await resp.json();
            if (res.ok) {
                document.getElementById("new_user_name").value = "";
                document.getElementById("new_user_pass").value = "";
                loadUsersData();
            } else {
                alert("Errore creazione: " + res.error);
            }
        } catch (e) {
            alert("Errore di rete.");
        }
    }

    async function deleteUser(username) {
        if (!confirm(`Eliminare definitivamente l'utente ${username}?`)) return;
        try {
            const resp = await fetch(`/zentra/api/users/${username}`, { method: "DELETE" });
            const res = await resp.json();
            if (res.ok) loadUsersData();
            else alert("Errore: " + res.error);
        } catch (e) { alert("Errore di rete."); }
    }

    async function promptChangePass(username) {
        const p = prompt(`Inserisci nuova password per l'utente '${username}':`);
        if (!p) return;
        try {
            const resp = await fetch(`/zentra/api/users/${username}/password`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({password: p})
            });
            const res = await resp.json();
            if (res.ok) alert("Password aggiornata con successo.");
            else alert("Errore: " + res.error);
        } catch (e) { alert("Errore di rete."); }
    }
  </script>
</div>
