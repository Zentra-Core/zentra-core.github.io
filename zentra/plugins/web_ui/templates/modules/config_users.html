<div id="tab-users" class="panel">
  <div style="display:flex; flex-direction:column; gap:20px;">
    <!-- FASE 5: My Profile Card -->
    <div class="card" style="box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s;">
      <div class="card-title" style="display:flex; align-items:center; gap:10px; color:#66fcf1;">
          <span style="font-size:18px;">👤</span> {{ t('webui_conf_user_profile_title') }}
      </div>
      <div class="row" style="gap:25px; align-items: flex-start;">
        <div class="group" style="flex:2; display:flex; flex-direction:column; gap:12px;">
          <label style="font-weight: 600; color: #45a29e; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;">{{ t('webui_conf_user_setup') }}</label>
          <input type="text" id="my_display_name" class="input-modern" placeholder="{{ t('webui_conf_user_display_name_ph') }}" style="width:100%;">
          <textarea id="my_bio_notes" class="input-modern" placeholder="{{ t('webui_conf_user_bio_ph') }}" style="height:80px; width:100%;"></textarea>
          <select id="my_language" class="input-modern" style="width:100%;">
              <option value="en">{{ t('lang_en') }} (US)</option>
              <option value="it">{{ t('lang_it') }} (IT)</option>
              <option value="es">{{ t('lang_es') }} (ES)</option>
          </select>
          <div style="margin-top:5px;">
              <button type="button" class="btn btn-primary" onclick="saveMyProfile()" style="padding: 10px 20px;">{{ t('webui_conf_btn_save') or 'Save Profile' }}</button>
          </div>
        </div>
        <div class="group" style="flex:1; text-align:center; background: rgba(30, 36, 48, 0.5); padding: 20px; border-radius: 12px; border: 1px solid #333;">
          <label style="display:block; margin-bottom:15px; font-weight: 600; color: #45a29e;">{{ t('label_avatar') or 'Avatar' }}</label>
          <div style="margin-bottom: 20px; position: relative; display: inline-block;">
              <img id="my_avatar_preview" src="" alt="Avatar" style="width:120px; height:120px; border-radius:50%; object-fit:cover; border:3px solid #66fcf1; display:none; box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);">
              <div id="my_avatar_placeholder" style="width:120px; height:120px; border-radius:50%; background:#1e2430; border:2px dashed #444; color:#888; display:flex; align-items:center; justify-content:center; font-size:12px;">No Image</div>
          </div>
          <input type="file" id="my_avatar_file" accept="image/jpeg, image/png" style="display:none;" onchange="uploadMyAvatar()">
          <button type="button" class="btn btn-secondary" onclick="document.getElementById('my_avatar_file').click()" style="width:100%; display:flex; align-items:center; justify-content:center; gap:8px;">
              <span style="font-size:16px;">📸</span> {{ t('label_change_avatar') }}
          </button>
        </div>
      </div>
    </div>

    <div class="card" style="box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);">
      <div class="card-title" style="display:flex; align-items:center; gap:10px;">
          <span style="font-size:18px;">🛡️</span> {{ t('webui_conf_users_roles_title') }}
      </div>
      <div class="row" style="gap:25px; align-items: stretch;">
        <div class="group" style="flex:2;">
          <label style="font-weight: 600; color: #45a29e; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;">{{ t('webui_conf_registered_accounts') }}</label>
          <div id="users-table-container" style="background:#161b22; border:1px solid #30363d; border-radius:12px; padding:10px; min-height:180px; overflow-x:auto; margin-top:10px; border: 1px solid #333;">
              <p style="color:#888; font-size:12px; padding:20px; text-align:center;">{{ t('webui_chat_loading') }}...</p>
          </div>
        </div>
        
        <div class="group" style="flex:1; background: rgba(30,36,48,0.3); padding: 20px; border-radius: 12px; border: 1px solid #333; display:flex; flex-direction:column; gap:12px;">
          <label style="font-weight: 600; color: #45a29e; font-size: 13px; text-transform: uppercase;">{{ t('webui_conf_create_user_title') }}</label>
          <div style="display:flex; flex-direction:column; gap:12px;">
              <input type="text" id="new_user_name" class="input-modern" placeholder="Username" autocomplete="off" style="width:100%;">
              <input type="password" id="new_user_pass" class="input-modern" placeholder="Password" style="width:100%;">
              <select id="new_user_role" class="input-modern" style="width:100%;">
                  <option value="guest">Guest (Base)</option>
                  <option value="admin">Admin (Master)</option>
              </select>
          </div>
          <button type="button" class="btn btn-secondary" onclick="createUser()" style="width:100%; margin-top:10px; background:#45a29e !important; color:#0b0c10; font-weight:bold; padding: 12px; border:none; border-radius:6px; cursor:pointer;">+ {{ t('webui_conf_create_user_title') }}</button>
        </div>
      </div>
    </div>

  </div><!-- End flex wrapper -->
  <script>
    async function loadMyProfile() {
        try {
            const r = await fetch("/zentra/api/users/me/profile");
            const res = await r.json();
            if (res.ok && res.profile) {
                document.getElementById('my_display_name').value = res.profile.display_name || "";
                document.getElementById('my_bio_notes').value = res.profile.bio_notes || "";
                
                if (res.profile.preferred_language) {
                    document.getElementById('my_language').value = res.profile.preferred_language;
                }
                
                if (res.profile.avatar_path) {
                    const img = document.getElementById('my_avatar_preview');
                    img.src = res.profile.avatar_path + "?t=" + new Date().getTime(); // force reload
                    img.style.display = "block";
                    document.getElementById('my_avatar_placeholder').style.display = "none";
                }
            }
        } catch (e) {
            console.error("Error loading profile:", e);
        }
    }

    async function saveMyProfile() {
        const data = {
            display_name: document.getElementById('my_display_name').value,
            bio_notes: document.getElementById('my_bio_notes').value,
            preferred_language: document.getElementById('my_language').value
        };
        try {
            const r = await fetch("/zentra/api/users/me/profile", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            const res = await r.json();
            if (res.ok) {
                alert("Profilo aggiornato!");
            } else {
                alert("Errore salvataggio profilo: " + res.error);
            }
        } catch (e) {
            alert("Errore di rete.");
        }
    }

    async function uploadMyAvatar() {
        const fileInput = document.getElementById('my_avatar_file');
        const file = fileInput.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        try {
            const r = await fetch("/zentra/api/users/me/avatar", {
                method: "POST",
                body: formData
            });
            const res = await r.json();
            if (res.ok) {
                const img = document.getElementById('my_avatar_preview');
                img.src = res.avatar_path + "?t=" + new Date().getTime();
                img.style.display = "block";
                document.getElementById('my_avatar_placeholder').style.display = "none";
            } else {
                alert("Errore caricamento avatar: " + res.error);
            }
        } catch (e) {
            alert("Errore caricamento.");
        }
    }

    async function loadUsersData() {
        const container = document.getElementById("users-table-container");
        try {
            const r = await fetch("/zentra/api/users");
            const res = await r.json();
            
            if (res.ok) {
                if (res.users.length === 0) {
                    const noUsersMsg = (window.I18N && window.I18N.msg_no_users) || "No users registered.";
                    container.innerHTML = `<p style="color:#888; font-size:13px; padding:20px; text-align:center;">${noUsersMsg}</p>`;
                    return;
                }
                
                let html = `
                <table style="width:100%; border-collapse: collapse; text-align: left; font-size:13px;">
                    <thead>
                        <tr style="background: rgba(102, 252, 241, 0.05); color:#66fcf1; border-bottom: 2px solid #30363d;">
                            <th style="padding: 12px; font-weight: 500;">ID</th>
                            <th style="padding: 12px; font-weight: 500;">Username</th>
                            <th style="padding: 12px; font-weight: 500;">Role</th>
                            <th style="padding: 12px; font-weight: 500; text-align:right;">Gestione</th>
                        </tr>
                    </thead>
                    <tbody>
                `;
                res.users.forEach(u => {
                    let actions = "";
                    const isSelf = u.username === "admin"; // Simple check for now
                    
                    if (isSelf) {
                        actions = `<button type="button" class="btn btn-secondary" style="padding:4px 10px; font-size:11px; border-radius:4px;" onclick="promptChangePass('${u.username}')">Chg Pass</button>`;
                    } else {
                         actions = `
                            <button type="button" class="btn btn-secondary" style="padding:4px 10px; font-size:11px; border-radius:4px; margin-right:4px;" onclick="promptChangePass('${u.username}')">Pass</button>
                            <button type="button" class="btn btn-secondary" style="padding:4px 10px; font-size:11px; border-radius:4px; background:#422 !important; border-color:#633; color:#f88;" onclick="deleteUser('${u.username}')">Elimina</button>
                        `;
                    }

                    html += `
                        <tr style="border-bottom: 1px solid #1e2430; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='transparent'">
                            <td style="padding: 12px; color:#555;">#${u.id}</td>
                            <td style="padding: 12px; font-weight:600; color:#c5c6c7;">${u.username}</td>
                            <td style="padding: 12px;"><span style="background: rgba(69, 162, 158, 0.2); color:#45a29e; padding:2px 6px; border-radius:4px; font-size:10px; text-transform:uppercase; font-weight:bold;">${u.role}</span></td>
                            <td style="padding: 12px; text-align:right;">${actions}</td>
                        </tr>
                    `;
                });
                html += `</tbody></table>`;
                container.innerHTML = html;
            } else {
                container.innerHTML = `<p style="color:#f88; font-size:13px; padding:20px;">Errore: ${res.error}</p>`;
            }
        } catch (e) {
            container.innerHTML = `<p style="color:#f88; font-size:13px; padding:20px;">Connessione al server fallita.</p>`;
        }
    }

    async function createUser() {
        const u = document.getElementById("new_user_name").value;
        const p = document.getElementById("new_user_pass").value;
        const r = document.getElementById("new_user_role").value;
        if (!u || !p) { alert("Username e password obbligatori."); return; }

        try {
            const resp = await fetch("/zentra/api/users", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({username: u, password: p, role: r})
            });
            const res = await resp.json();
            if (res.ok) {
                document.getElementById("new_user_name").value = "";
                document.getElementById("new_user_pass").value = "";
                loadUsersData();
            } else {
                alert("Errore creazione: " + res.error);
            }
        } catch (e) {
            alert("Errore di rete.");
        }
    }

    async function deleteUser(username) {
        if (!confirm(`Eliminare definitivamente l'utente ${username}?`)) return;
        try {
            const resp = await fetch(`/zentra/api/users/${username}`, { method: "DELETE" });
            const res = await resp.json();
            if (res.ok) loadUsersData();
            else alert("Errore: " + res.error);
        } catch (e) { alert("Errore di rete."); }
    }

    async function promptChangePass(username) {
        const p = prompt(`Inserisci nuova password per l'utente '${username}':`);
        if (!p) return;
        try {
            const resp = await fetch(`/zentra/api/users/${username}/password`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({password: p})
            });
            const res = await resp.json();
            if (res.ok) alert("Password aggiornata con successo.");
            else alert("Errore: " + res.error);
        } catch (e) { alert("Errore di rete."); }
    }
  </script>
</div>
