<!-- KEY MANAGER PANEL -->
<div id="tab-keymanager" class="panel">

  <!-- Header card -->
  <div class="card">
    <div class="card-title" style="display:flex;align-items:center;gap:10px;">
      🔑 {{ t('webui_km_title') }}
      <span id="km-global-status" style="font-size:11px;font-weight:400;margin-left:auto;color:var(--muted)">{{ t('webui_km_loading') }}</span>
    </div>
    <p style="font-size:12px;color:var(--muted);margin:0 0 8px;">
      {{ t('webui_km_desc') }}
    </p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn-sm btn-primary" onclick="kmRefresh()">⟳ {{ t('webui_km_btn_refresh') }}</button>
      <button class="btn-sm" onclick="kmReloadAll()">↺ {{ t('webui_km_btn_reload') }}</button>
    </div>
  </div>

  <!-- Provider pools (dynamic) -->
  <div id="km-providers-container">
    <div class="card" style="color:var(--muted);text-align:center;padding:20px;">
      {{ t('webui_km_loading') }}
    </div>
  </div>

  <!-- Add Key Card -->
  <div class="card" id="km-add-card">
    <div class="card-title">➕ {{ t('webui_km_add_title') }}</div>
    <div class="field">
      <label>Provider</label>
      <select id="km-add-provider">
        <option value="groq">Groq</option>
        <option value="gemini">Gemini</option>
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
        <option value="mistral">Mistral</option>
        <option value="perplexity">Perplexity</option>
        <option value="stability">Stability AI</option>
        <option value="pollinations">Pollinations</option>
        <option value="huggingface">Hugging Face</option>
        <option value="custom">Custom...</option>
      </select>
    </div>
    <div class="field" id="km-custom-provider-field" style="display:none;">
      <label>Nome Provider (custom)</label>
      <input type="text" id="km-custom-provider-name" placeholder="es: my_provider">
    </div>
    <div class="field">
      <label>{{ t('webui_km_add_val') }}</label>
      <input type="password" id="km-add-value" placeholder="sk-... / gsk_... / AIza...">
    </div>
    <div class="field">
      <label>{{ t('webui_km_add_desc') }}</label>
      <input type="text" id="km-add-desc" placeholder="es: Groq Free Tier - account personale">
    </div>
    <div class="field" style="display:flex;align-items:center;gap:8px;margin-top:4px;">
      <input type="checkbox" id="km-add-to-env" style="width:auto;margin:0;">
      <label for="km-add-to-env" style="font-weight:normal;color:var(--muted);font-size:11px;">{{ t('webui_km_add_env') }}</label>
    </div>
    <button class="btn-sm btn-primary" onclick="kmAddKey()" style="margin-top:8px;">{{ t('webui_km_add_btn') }}</button>
    <div id="km-add-feedback" style="font-size:12px;margin-top:8px;"></div>
  </div>

</div>

<style>
.km-provider-block { margin-bottom: 0; }
.km-key-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.km-key-row:last-child { border-bottom: none; }
.km-badge {
  font-size: 10px; font-weight: 600; padding: 2px 7px;
  border-radius: 10px; white-space: nowrap; text-transform: uppercase;
}
.km-badge-valid     { background: #1a4a2a; color: #4cde82; }
.km-badge-unknown   { background: #2a2a2a; color: #aaa; }
.km-badge-rate      { background: #4a3a00; color: #ffc740; }
.km-badge-invalid   { background: #4a1a1a; color: #ff6b6b; }
.km-key-info { flex: 1; min-width: 0; }
.km-key-masked { font-family: monospace; font-size: 12px; color: var(--muted); }
.km-key-desc  { font-size: 11px; color: var(--muted); opacity: 0.7; }
.km-key-source { font-size: 10px; color: var(--muted); opacity: 0.5; }
.km-cooldown { font-size: 11px; color: #ffc740; }
.km-actions { display:flex; gap:4px; }
.btn-sm-reset {
  /* removed */
}
.km-count-bar {
  display: flex; gap:6px; font-size: 11px; margin-bottom: 8px; flex-wrap: wrap;
}
.km-count-item { padding: 2px 8px; border-radius: 8px; background: var(--surface2); }
</style>

<script>
// ── Key Manager UI ──────────────────────────────────────────────
function kmStatusBadge(status) {
  const map = {
    valid:        ['km-badge-valid', '🟢 ' + (window.t ? window.t('webui_km_status_valid') : 'Valid')],
    unknown:      ['km-badge-unknown', '⚪ ' + (window.t ? window.t('webui_km_status_unknown') : 'Unknown')],
    rate_limited: ['km-badge-rate', '🟡 ' + (window.t ? window.t('webui_km_status_rate') : 'Rate Limited')],
    invalid:      ['km-badge-invalid', '🔴 ' + (window.t ? window.t('webui_km_status_invalid') : 'Invalid')],
  };
  const [cls, label] = map[status] || ['km-badge-unknown', '⚪ ?'];
  return `<span class="km-badge ${cls}">${label}</span>`;
}

function kmRender(data) {
  const container = document.getElementById('km-providers-container');
  container.innerHTML = '';

  const providers = Object.keys(data);
  if (!providers.length) {
    container.innerHTML = `<div class="card" style="color:var(--muted);text-align:center;padding:20px;">${window.t ? window.t('webui_km_none') : 'No keys loaded.'}</div>`;
    return;
  }

  let totalAvail = 0, totalAll = 0;

  for (const provider of providers) {
    const keys = data[provider];
    totalAll += keys.length;
    totalAvail += keys.filter(k => k.available).length;

    const rows = keys.map((k, idx) => {
      const cooldownHtml = k.cooldown_remaining > 0
        ? `<span class="km-cooldown">⏱ cooldown: ${k.cooldown_remaining}s</span>` : '';
      const canReset = k.status !== 'valid' && k.status !== 'unknown';
      const canRemove = k.source === 'keys_yaml';
      return `
        <div class="km-key-row" data-provider="${provider}" data-idx="${idx}">
          ${kmStatusBadge(k.status)}
          <div class="km-key-info">
            <div class="km-key-masked">${k.value}</div>
            ${k.description ? `<div class="km-key-desc">${k.description}</div>` : ''}
            <div class="km-key-source">${window.t ? window.t('webui_km_source') : 'source'}: ${k.source} ${cooldownHtml}</div>
          </div>
          <div class="km-actions">
            ${canReset ? `<button class="btn-sm btn-secondary" onclick="kmResetKey('${provider}','${k.value}')">↺ Reset</button>` : ''}
            ${canRemove ? `<button class="btn-sm" style="border-color:var(--red); color:var(--red); background:rgba(248,113,113,0.1);" onclick="kmRemoveKey('${provider}','${k.value}')">✕</button>` : ''}
          </div>
        </div>`;
    }).join('');

    const avail = keys.filter(k => k.available).length;
    const rateL = keys.filter(k => k.status === 'rate_limited').length;
    const inv   = keys.filter(k => k.status === 'invalid').length;

    const card = document.createElement('div');
    card.className = 'card km-provider-block';
    card.innerHTML = `
      <div class="card-title" style="text-transform:uppercase;font-size:13px;letter-spacing:.05em;">
        ${provider}
      </div>
      <div class="km-count-bar">
        <span class="km-count-item">${window.t ? window.t('webui_km_total') : 'Total'}: ${keys.length}</span>
        <span class="km-count-item" style="color:#4cde82">✓ ${avail} ${window.t ? window.t('webui_km_available') : 'available'}</span>
        ${rateL ? `<span class="km-count-item" style="color:#ffc740">⏱ ${rateL} ${window.t ? window.t('webui_km_cooldown') : 'in cooldown'}</span>` : ''}
        ${inv ? `<span class="km-count-item" style="color:#ff6b6b">✗ ${inv} ${window.t ? window.t('webui_km_status_invalid') : 'invalid'}</span>` : ''}
      </div>
      ${rows}
      <div style="margin-top:8px;">
        <button class="btn-sm" onclick="kmResetProvider('${provider}')">↺ ${window.t ? window.t('webui_km_btn_reset_prov') : 'Reset provider'}</button>
      </div>
    `;
    container.appendChild(card);
  }

  const gs = document.getElementById('km-global-status');
  gs.textContent = `${providers.length} provider · ${totalAvail}/${totalAll} chiavi disponibili`;
  gs.style.color = totalAvail === 0 ? '#ff6b6b' : totalAvail < totalAll ? '#ffc740' : '#4cde82';
}

function kmRefresh() {
  fetch('/api/keys/status')
    .then(r => r.json())
    .then(d => { if (d.ok) kmRender(d.data); else console.warn('[KM]', d.error); })
    .catch(e => console.error('[KM] refresh error:', e));
}

function kmReloadAll() {
  fetch('/api/keys/reload', {method: 'POST'})
    .then(r => r.json())
    .then(d => { if (d.ok) { kmRefresh(); } })
    .catch(e => console.error('[KM] reload error:', e));
}

function kmResetKey(provider, value) {
  fetch(`/api/keys/reset`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({provider, value})
  }).then(r => r.json()).then(d => { if (d.ok) kmRefresh(); });
}

function kmResetProvider(provider) {
  fetch(`/api/keys/reset_provider`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({provider})
  }).then(r => r.json()).then(d => { if (d.ok) kmRefresh(); });
}

function kmRemoveKey(provider, value) {
  if (!confirm(`Rimuovere la chiave ${value} per "${provider}"?`)) return;
  fetch('/api/keys/remove', {
    method: 'DELETE',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({provider, value})
  }).then(r => r.json()).then(d => {
    if (d.ok) kmRefresh();
    else alert('Errore: ' + (d.error || 'impossibile rimuovere chiave'));
  });
}

function kmAddKey() {
  const providerSel = document.getElementById('km-add-provider').value;
  const provider = providerSel === 'custom'
    ? document.getElementById('km-custom-provider-name').value.trim()
    : providerSel;
  const value = document.getElementById('km-add-value').value.trim();
  const desc  = document.getElementById('km-add-desc').value.trim();
  const toEnv = document.getElementById('km-add-to-env').checked;
  const fb    = document.getElementById('km-add-feedback');

  if (!provider) { fb.textContent = '⚠️ Specifica il nome del provider.'; fb.style.color='#ff6b6b'; return; }
  if (!value)    { fb.textContent = '⚠️ Inserisci il valore della chiave.'; fb.style.color='#ff6b6b'; return; }

  fetch('/api/keys/add', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({provider, value, description: desc, save_to_env: toEnv})
  }).then(r => r.json()).then(d => {
    if (d.ok) {
      fb.textContent = toEnv ? '✅ Chiave aggiunta al file .env' : '✅ Chiave aggiunta a keys.yaml';
      fb.style.color = '#4cde82';
      document.getElementById('km-add-value').value = '';
      document.getElementById('km-add-desc').value  = '';
      setTimeout(kmRefresh, 400);
    } else {
      fb.textContent = '⚠️ ' + (d.error || 'Errore aggiunta chiave');
      fb.style.color = '#ff6b6b';
    }
  });
}

// Handle custom provider select
document.getElementById('km-add-provider')?.addEventListener('change', function() {
  document.getElementById('km-custom-provider-field').style.display =
    this.value === 'custom' ? '' : 'none';
});

// Auto-load on tab activation
(function() {
  const panel = document.getElementById('tab-keymanager');
  if (!panel) return;
  const observer = new MutationObserver(() => {
    if (panel.classList.contains('active') || panel.style.display !== 'none') {
      kmRefresh();
    }
  });
  observer.observe(panel, {attributes: true, attributeFilter: ['class', 'style']});
  // Also load immediately if panel is already visible
  if (panel.classList.contains('active')) kmRefresh();
})();
</script>
